<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>שואלים את המנכ״ל | מאגר חוזרי מנכ״ל</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#f6f4ee;--paper-deep:#efece2;--ink:#14295b;--ink-soft:#3c4c78;--sky:#82c6f6;--sky-wash:#e7f3fd;--card:#fffdf9;--line:#cfc9b8;--error-bg:#fbeaea;--error-ink:#8a1f1f;--radius:10px;--shadow:0 1px 2px rgba(20,41,91,.08),0 6px 24px -12px rgba(20,41,91,.18)}
*{box-sizing:border-box}
body{margin:0;min-height:100dvh;display:flex;flex-direction:column;font-family:'Heebo','Segoe UI',sans-serif;font-size:16px;line-height:1.65;color:var(--ink);background:linear-gradient(180deg,var(--paper) 0%,var(--paper-deep) 100%) fixed}
:focus-visible{outline:3px solid var(--ink);outline-offset:2px;border-radius:4px}
.letterhead{padding:18px 16px 0;background:var(--card)}
.letterhead-inner{max-width:780px;margin:0 auto;display:flex;align-items:center;gap:14px}
.seal{flex:none;width:54px;height:54px;border:2.5px solid var(--ink);border-radius:50%;display:grid;place-items:center;font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:15px;color:var(--ink);background:var(--sky-wash);box-shadow:inset 0 0 0 3px var(--card)}
h1{margin:0;font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:clamp(1.4rem,4.5vw,1.9rem);line-height:1.2}
.subtitle{margin:2px 0 0;color:var(--ink-soft);font-size:clamp(.82rem,2.8vw,.95rem)}
.rule-double{max-width:780px;margin:14px auto 0;border-top:3px solid var(--ink);border-bottom:1px solid var(--ink);height:3px}
main{flex:1;width:100%;max-width:780px;margin:0 auto;padding:20px 16px 8px;display:flex;flex-direction:column}
.thread{flex:1;display:flex;flex-direction:column;gap:16px;padding-bottom:16px}
.msg{animation:rise .35s ease both;max-width:92%}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg-user{align-self:flex-start;background:var(--ink);color:#f4f7ff;padding:10px 16px;border-radius:var(--radius) var(--radius) var(--radius) 3px;box-shadow:var(--shadow);white-space:pre-wrap;word-break:break-word}
.msg-bot{align-self:stretch;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow);white-space:pre-wrap;word-break:break-word}
.msg-bot.streaming:after{content:"▍";color:var(--ink-soft);animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.sources{display:flex;flex-direction:column;gap:8px;margin-top:12px;padding-top:10px;border-top:1px dashed var(--line)}
.sources-label{font-size:.78rem;font-weight:700;color:var(--ink-soft)}
.source-card{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--paper);border:1px dashed var(--ink-soft);border-radius:8px;text-decoration:none;color:var(--ink);min-height:44px}
.source-card:hover{background:var(--sky-wash);border-color:var(--ink)}
.source-num{flex:none;font-weight:700;font-size:.8rem;background:var(--ink);color:#fff;border-radius:6px;padding:3px 8px}
.source-title{font-size:.9rem;line-height:1.35}
.source-ext{margin-inline-start:auto;flex:none;color:var(--ink-soft)}
.welcome{text-align:center;margin:8vh auto 0;max-width:560px}
.welcome h2{font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:clamp(1.15rem,4vw,1.5rem);margin:0 0 6px}
.welcome p{color:var(--ink-soft);margin:0 0 22px;font-size:.95rem}
.suggestions{display:flex;flex-direction:column;gap:10px;list-style:none;padding:0;margin:0}
.suggestion{width:100%;text-align:right;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 16px;font:inherit;font-size:.95rem;color:var(--ink);cursor:pointer;min-height:48px;box-shadow:var(--shadow)}
.suggestion:hover{border-color:var(--sky);transform:translateY(-1px)}
.status-line{color:var(--ink-soft);font-size:.88rem;display:flex;align-items:center;gap:8px}
.status-line:before{content:"";width:9px;height:9px;border-radius:50%;background:var(--sky);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{50%{opacity:.3}}
.notice{background:var(--sky-wash);border:1px solid var(--sky);color:var(--ink);border-radius:var(--radius);padding:10px 14px;font-size:.92rem}
.notice.error{background:var(--error-bg);border-color:var(--error-ink);color:var(--error-ink)}
.composer{position:sticky;bottom:0;background:linear-gradient(0deg,var(--paper) 75%,transparent);padding:10px 0 14px}
.composer form{display:flex;gap:8px;align-items:flex-end;background:var(--card);border:1.5px solid var(--ink-soft);border-radius:14px;padding:8px}
.composer textarea{flex:1;border:0;background:transparent;resize:none;font:inherit;color:var(--ink);min-height:44px;max-height:140px;padding:8px 10px}
.composer textarea:focus{outline:none}
.composer button{flex:none;min-width:74px;min-height:44px;border:0;border-radius:10px;background:var(--ink);color:#fff;font:inherit;font-weight:500;cursor:pointer}
.composer button:disabled{opacity:.45;cursor:not-allowed}
.site-footer{max-width:780px;margin:0 auto;padding:10px 16px 18px;font-size:.78rem;color:var(--ink-soft);border-top:1px solid var(--line);text-align:center}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important}}
</style>
</head>
<body>
<header class="letterhead">
  <div class="letterhead-inner">
    <div class="seal" aria-hidden="true">מנכ״ל</div>
    <div>
      <h1>שואלים את המנכ״ל</h1>
      <p class="subtitle">מענה מתוך חוזרי המנכ״ל בתוקף של משרד החינוך</p>
    </div>
  </div>
  <div class="rule-double" aria-hidden="true"></div>
</header>
<main>
  <div class="thread" id="thread" aria-live="polite"></div>
  <div class="composer">
    <form id="chat-form">
      <textarea id="chat-input" rows="1" maxlength="1100" placeholder="מה השאלה? למשל: מתי נדרש מלווה חמוש בטיול?" aria-label="שאלה על חוזרי מנכל"></textarea>
      <button id="send-btn" type="submit">שליחה</button>
    </form>
  </div>
</main>
<footer class="site-footer">המידע נשלף מחוזרי המנכ״ל הרשמיים באתר משרד החינוך. הנוסח המחייב הוא הנוסח המלא באתר המשרד - מומלץ לעיין בהוראה המקושרת בכל תשובה. אין להזין פרטים אישיים בשאלות.</footer>
<script>
var API = 'https://yiekqvcflhrcqnrxwuiq.supabase.co/functions/v1/mankal-bot';
var MAX = 1000;
var messages = [];
var busy = false;
var sid = localStorage.getItem('mkb_sid');
if (!sid) { sid = Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('mkb_sid', sid); }
var thread = document.getElementById('thread');
var input = document.getElementById('chat-input');
var btn = document.getElementById('send-btn');
var form = document.getElementById('chat-form');

function el(tag, cls, text) { var e = document.createElement(tag); if (cls) e.className = cls; if (text) e.textContent = text; return e; }

function nearBottom() {
  return window.innerHeight + window.scrollY >= document.body.scrollHeight - 160;
}
function scrollIfNearBottom() {
  if (nearBottom()) window.scrollTo(0, document.body.scrollHeight);
}

function render(streamingText) {
  thread.replaceChildren();
  if (messages.length === 0 && streamingText === null) {
    var w = el('section', 'welcome');
    w.appendChild(el('h2', null, 'מה רצית לבדוק בחוזרי המנכ״ל?'));
    w.appendChild(el('p', null, 'אפשר לשאול כל שאלה בנושא חוזרי המנכ״ל, בשפה חופשית - התשובה תגיע מתוך ההוראות שבתוקף, עם ציטוט וקישור למקור.'));
    w.appendChild(el('p', 'sources-label', 'שאלות לדוגמה - לחצו, או כתבו שאלה משלכם:'));
    var ul = el('ul', 'suggestions');
    var sugg = ['מתי נדרש מלווה חמוש בטיול בית ספרי?', 'מה נוהל הטיפול באירוע אלימות בין תלמידים?', 'אילו אישורים נדרשים לקיום פעילות מים בטיול?', 'מה חובות בית הספר לפי חוק זכויות התלמיד?'];
    for (var i = 0; i < sugg.length; i++) {
      (function (q) {
        var li = el('li');
        var b = el('button', 'suggestion', q);
        b.type = 'button';
        b.onclick = function () { send(q); };
        li.appendChild(b);
        ul.appendChild(li);
      })(sugg[i]);
    }
    w.appendChild(ul);
    thread.appendChild(w);
    return;
  }
  for (var j = 0; j < messages.length; j++) {
    var m = messages[j];
    var d = el('div', m.role === 'user' ? 'msg msg-user' : 'msg msg-bot', m.content);
    if (m.role === 'assistant' && m.sources && m.sources.length) {
      d.appendChild(sourcesBlock(m.sources, m.cited));
    }
    thread.appendChild(d);
  }
  if (streamingText !== null) {
    var s = el('div', 'msg msg-bot streaming');
    if (streamingText === '') {
      s.appendChild(el('span', 'status-line', 'מחפש בחוזרי המנכ״ל...'));
    } else {
      s.textContent = streamingText;
    }
    thread.appendChild(s);
  }
  window.scrollTo(0, document.body.scrollHeight);
}

function sourcesBlock(sources, cited) {
  var wrap = el('div', 'sources');
  var shown = sources;
  var label = 'הוראות רלוונטיות שנבדקו';
  if (cited && cited.length) {
    var byCited = sources.filter(function (s) { return cited.indexOf(s.siduri) >= 0; });
    if (byCited.length) { shown = byCited; label = 'הוראות שצוטטו בתשובה'; }
  }
  wrap.appendChild(el('span', 'sources-label', label));
  for (var i = 0; i < shown.length; i++) {
    var s = shown[i];
    var a = el('a', 'source-card');
    a.href = s.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.appendChild(el('span', 'source-num', s.number));
    a.appendChild(el('span', 'source-title', s.title));
    a.appendChild(el('span', 'source-ext', '↗'));
    wrap.appendChild(a);
  }
  return wrap;
}

function notice(text, isErr) {
  var n = el('div', 'notice' + (isErr ? ' error' : ''), text);
  n.setAttribute('role', 'alert');
  thread.appendChild(n);
  window.scrollTo(0, document.body.scrollHeight);
}

function send(q) {
  q = (q || '').trim();
  if (!q || busy || q.length > MAX) return;
  busy = true;
  btn.disabled = true;
  btn.textContent = 'עונה...';
  input.value = '';
  messages.push({ role: 'user', content: q });

  // בנייה חד-פעמית: מסירים את מסך הפתיחה אם קיים, מוסיפים בועת משתמש ובועת תשובה -
  // ובזמן הסטרימינג מעדכנים אך ורק את טקסט הבועה (בלי לבנות את הדף מחדש = בלי ריצוד)
  var welcome = thread.querySelector('.welcome');
  if (welcome) welcome.remove();
  thread.appendChild(el('div', 'msg msg-user', q));
  var botEl = el('div', 'msg msg-bot streaming');
  var statusEl = el('span', 'status-line', 'מחפש בחוזרי המנכ״ל...');
  botEl.appendChild(statusEl);
  thread.appendChild(botEl);
  window.scrollTo(0, document.body.scrollHeight);

  var text = '', sources = [], cited = [];
  fetch(API + '/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-mkb-sid': sid },
    body: JSON.stringify({ messages: messages.map(function (m) { return { role: m.role, content: m.content }; }) })
  }).then(function (res) {
    var reader = res.body.getReader();
    var dec = new TextDecoder();
    var buf = '';
    var errMsg = null;
    function pump() {
      return reader.read().then(function (r) {
        if (r.done) return finish();
        buf += dec.decode(r.value, { stream: true });
        var lines = buf.split('\n');
        buf = lines.pop() || '';
        var changed = false;
        for (var i = 0; i < lines.length; i++) {
          if (!lines[i].trim()) continue;
          var ev;
          try { ev = JSON.parse(lines[i]); } catch (e) { continue; }
          if (ev.type === 'delta' && ev.text) { text += ev.text; changed = true; }
          else if (ev.type === 'sources') sources = ev.sources || [];
          else if (ev.type === 'citation' && ev.citation) cited.push(ev.citation.siduri);
          else if (ev.type === 'error') errMsg = ev.message || 'אירעה תקלה';
        }
        if (changed && text) {
          botEl.textContent = text;
          scrollIfNearBottom();
        }
        return pump();
      });
    }
    function finish() {
      if (errMsg && !text) {
        messages.pop();
        botEl.previousSibling.remove();
        botEl.remove();
        if (messages.length === 0) render(null);
        notice(errMsg, res.status !== 429 && res.status !== 503);
      } else {
        messages.push({ role: 'assistant', content: text, sources: sources, cited: cited });
        botEl.classList.remove('streaming');
        botEl.textContent = text;
        if (sources.length) botEl.appendChild(sourcesBlock(sources, cited));
        scrollIfNearBottom();
      }
      busy = false;
      btn.disabled = false;
      btn.textContent = 'שליחה';
      input.focus();
    }
    return pump();
  }).catch(function () {
    messages.pop();
    botEl.previousSibling.remove();
    botEl.remove();
    if (messages.length === 0) render(null);
    notice('שגיאת רשת - בדקו את החיבור ונסו שוב', true);
    busy = false;
    btn.disabled = false;
    btn.textContent = 'שליחה';
  });
}

form.addEventListener('submit', function (e) { e.preventDefault(); send(input.value); });
input.addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input.value); }
});
render(null);
</script>
</body>
</html>
